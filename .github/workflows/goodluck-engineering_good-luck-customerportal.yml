# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - good-luck-customerportal

on:
  push:
    branches:
      - GoodLuck-Engineering
  workflow_dispatch:

concurrency:
  group: azure-deployment
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Sync Frontend Build to Backend
        run: |
          cp -r frontend/build/* backend/public/


      - name: Install backend dependencies (for App Service)
        run: |
          cd backend
          npm install

      - name: Remove log files before packaging
        run: rm -rf backend/logs/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'good-luck-customerportal'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DE93BCE5013842DABD35AC5C6B4F0494 }}